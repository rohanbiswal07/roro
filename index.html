<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Mobot AI Brain</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #00fff2; font-family: sans-serif; }
        #robot-face { display: flex; gap: 50px; margin-bottom: 20px; }
        .eye { width: 60px; height: 60px; background: #00fff2; border-radius: 50%; box-shadow: 0 0 20px #00fff2; transition: 0.2s; }
        .blink { height: 5px; }
        /* Camera ka chota dabba */
        #video { border: 2px solid #00fff2; border-radius: 10px; width: 150px; height: 110px; position: fixed; bottom: 20px; right: 20px; }
        #status { font-size: 1.2rem; text-align: center; }
    </style>
</head>
<body>

    <div id="robot-face">
        <div id="left-eye" class="eye"></div>
        <div id="right-eye" class="eye"></div>
    </div>

    <div id="status">AI Brain Load Ho Raha Hai...</div>
    
    <video id="video" autoplay muted></video>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');

        // 1. Camera On Karna 📸
        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                statusText.innerText = "Camera On! Ab AI models load ho rahe hain...";
                loadModels();
            } catch (err) {
                statusText.innerText = "Camera error! Settings check karein.";
            }
        }

        // 2. AI Brain (Models) Load Karna 🧠
        async function loadModels() {
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
            statusText.innerText = "AI Taiyar Hai! Mujhe apna chehra dikhaiye.";
            detectFace();
        }

        // 3. Chehra aur Expression Pehchanna 🧐
        async function detectFace() {
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                
                if (detections.length > 0) {
                    const expression = detections[0].expressions;
                    // Sabse zyada probability wala expression dhoondna
                    const topExpression = Object.keys(expression).reduce((a, b) => expression[a] > expression[b] ? a : b);
                    
                    statusText.innerText = "Main dekh raha hoon: " + topExpression;
                    
                    // Robot ki aankhein badalna
                    if (topExpression === 'happy') {
                        statusText.innerText = "Aap Khush Hain! 😊";
                    }
                } else {
                    statusText.innerText = "Koi dikh nahi raha...";
                }
            }, 500);
        }

        startVideo();
    </script>
</body>
</html>
