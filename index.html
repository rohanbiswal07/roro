<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoRo Voice Active</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00fff2; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .eye { width: 70px; height: 70px; background: #00fff2; border-radius: 50%; box-shadow: 0 0 20px #00fff2; margin: 20px; display: inline-block; transition: 0.3s; }
        #msg { font-size: 1.2rem; color: yellow; margin-top: 20px; text-align: center; padding: 0 20px; }
        #start-btn { padding: 20px 40px; font-size: 1.5rem; background: #00fff2; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="eyes-container">
        <div class="eye"></div>
        <div class="eye"></div>
    </div>

    <div id="msg">RoRo ko chalu karne ke liye button dabayein</div>
    <br>
    <button id="start-btn">START RORO 🎙️</button>

    <script>
        const msgBox = document.getElementById('msg');
        const startBtn = document.getElementById('start-btn');

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'hi-IN';
            window.speechSynthesis.speak(s);
        }

        // Voice Sunne ka "Super" Function 🎙️
        function startRoRoListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                msgBox.innerText = "Aapka browser voice support nahi karta.";
                return;
            }

            const recog = new SpeechRecognition();
            recog.lang = 'hi-IN';
            recog.continuous = false; // Mobile par false zyada stable rehta hai

            recog.onstart = () => {
                msgBox.innerText = "RoRo sun raha hai... Boliye 'Kaise ho'";
                console.log("Mic On ✅");
            };

            recog.onresult = (event) => {
                const command = event.results[0][0].transcript.toLowerCase();
                msgBox.innerText = "Maine suna: " + command;

                if (command.includes("kaise ho")) {
                    speak("Main bahut achha hoon Master! Aapka din kaisa hai?");
                } else if (command.includes("naam")) {
                    speak("Mera naam RoRo hai.");
                } else {
                    speak("Aapne kaha " + command);
                }
            };

            // Agar mic band ho jaye toh wapas chalu karein
            recog.onend = () => {
                console.log("Mic Restarting...");
                recog.start(); 
            };

            recog.onerror = (e) => {
                console.log("Error: ", e.error);
                if(e.error === 'not-allowed') msgBox.innerText = "Please Mic Permission Allow karein!";
            };

            recog.start();
        }

        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            speak("System chalu ho gaya hai. Namaste Master!");
            startRoRoListening();
        };
    </script>
</body>
</html>
